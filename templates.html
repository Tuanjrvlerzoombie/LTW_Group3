<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLIC - DUE | Templates</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="logo">
          <div class="logo-square"></div>
          <div class="logo-text">FLIC - DUE</div>
        </div>
        <nav class="nav-menu">
          <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
          </a>
          <a href="templates.html" class="nav-item active">
            <i class="fas fa-layer-group"></i>
            <span>Templates</span>
          </a>
          <a href="add-article.html" class="nav-item">
            <i class="fas fa-file-alt"></i>
            <span>Add Article</span>
          </a>
          <a href="activity.html" class="nav-item">
            <i class="fas fa-users-cog"></i>
            <span>Management</span>
          </a>
          <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
          </a>
        </nav>
        <div class="user-info">
          <div class="user-avatar">A</div>
          <div class="user-name">admin (admin)</div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="header">
          <h1>Home Templates</h1>
          <div class="header-actions">
            <button class="btn btn-success">
              <i class="fas fa-plus"></i> New Template
            </button>
            <div class="search-container">
              <input type="text" placeholder="Search template by name" />
              <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
          </div>
        </div>

        <div class="template-grid">
          <div class="template-card">
            <div class="template-image">
              <i class="fas fa-image"></i>
            </div>
            <div class="template-delete">
              <i class="fas fa-trash"></i>
            </div>
            <div class="template-title">123</div>
          </div>
          <div class="template-card">
            <div class="template-image">
              <i class="fas fa-image"></i>
            </div>
            <div class="template-delete">
              <i class="fas fa-trash"></i>
            </div>
            <div class="template-title">Quốc khánh 2/9</div>
          </div>
          <div class="template-card">
            <div class="template-image">
              <i class="fas fa-image"></i>
            </div>
            <div class="template-delete">
              <i class="fas fa-trash"></i>
            </div>
            <div class="template-title">Giáng sinh an lành</div>
          </div>
          <div class="template-card">
            <div class="template-image">
              <i class="fas fa-image"></i>
            </div>
            <div class="template-delete">
              <i class="fas fa-trash"></i>
            </div>
            <div class="template-title">Tết sum vầy</div>
          </div>
          <div class="template-card">
            <div class="template-image">
              <i class="fas fa-image"></i>
            </div>
            <div class="template-delete">
              <i class="fas fa-trash"></i>
            </div>
            <div class="template-title">Lễ 30/04</div>
          </div>
          <div class="template-card">
            <div class="template-image">
              <i class="fas fa-image"></i>
            </div>
            <div class="template-delete">
              <i class="fas fa-trash"></i>
            </div>
            <div class="template-title">Hè bùng nổ</div>
          </div>
          <div class="template-card">
            <div class="template-image">
              <i class="fas fa-image"></i>
            </div>
            <div class="template-delete">
              <i class="fas fa-trash"></i>
            </div>
            <div class="template-title">Sinh nhật 10 tuổi</div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
