<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLIC - DUE | Add Article (Author)</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="logo">
          <div class="logo-square"></div>
          <div class="logo-text">FLIC - DUE</div>
        </div>
        <nav class="nav-menu">
          <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Article</span>
          </a>
          <a href="add-article.html" class="nav-item">
            <i class="fas fa-file-alt"></i>
            <span>Add Article</span>
          </a>
          <a href="add-article-author.html" class="nav-item active">
            <i class="fas fa-file-alt"></i>
            <span>Add Article (Author)</span>
          </a>

          <a href="activity.html" class="nav-item">
            <i class="fas fa-users-cog"></i>
            <span>Management</span>
          </a>
          <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
          </a>
        </nav>
        <div class="user-info">
          <a href="public-home.html" class="logout-btn">
            <div class="user-avatar">A</div>
            <div class="user-name">Logout</div>
          </a>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="header">
          <h1>Add Article</h1>
          <div class="header-actions">
            <button class="btn btn-secondary">Cancel</button>
            <button class="btn btn-primary">Submit</button>
          </div>
        </div>

        <div class="add-article-container">
          <div class="article-form">
            <div class="form-group">
              <label>Title</label>
              <input type="text" placeholder="Enter article title" />
            </div>

            <div class="form-group">
              <label>Content</label>
              <textarea placeholder="Enter article content" rows="8"></textarea>
            </div>

            <div class="form-row">
              <div class="form-group half">
                <label>Category</label>
                <div class="select-wrapper">
                  <select>
                    <option>Event</option>
                    <option>Knowledge</option>
                    <option>Course</option>
                  </select>
                </div>
              </div>
              <div class="form-group half">
                <label>Tags</label>
                <div class="tag-input-container">
                  <input type="text" placeholder="Add tags" />
                  <button class="btn btn-small">Add</button>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label>Images</label>
              <p class="form-hint">Add images to your article</p>
              <input type="file" />

              <label>Files</label>
              <p class="form-hint">Add files to your article</p>
              <input type="file" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
